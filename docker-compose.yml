version: '3.8'

services:
  order-service:
    build: ./order-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    depends_on:
      - payment-service
      - delivery-service

  payment-service:
    build: ./payment-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development

  delivery-service:
    build: ./delivery-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
